<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" /> <!-- Purple 500 -->
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" /> <!-- Indigo 500 -->
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3e8ff;stop-opacity:1" /> <!-- Purple 100 -->
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background Shape (Rounded Square) -->
  <rect x="32" y="32" width="448" height="448" rx="112" ry="112" fill="url(#bg-grad)" filter="url(#shadow)" />

  <!-- "IA" Text -->
  <text 
    x="50%" 
    y="54%" 
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
    font-size="240" 
    font-weight="800" 
    fill="url(#text-grad)" 
    text-anchor="middle" 
    dominant-baseline="middle"
    letter-spacing="-10"
  >
    IA
  </text>
  
  <!-- Little Sparkle -->
  <path 
    d="M 380 120 Q 390 150 420 160 Q 390 170 380 200 Q 370 170 340 160 Q 370 150 380 120" 
    fill="#fde047" 
  />
</svg>
